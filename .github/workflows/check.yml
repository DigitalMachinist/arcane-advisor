name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Guards against code style drift, unsafe patterns, and type errors before any tests run.
  # Catches: dead code, incorrect refactors, PHPStan violations, Pint style issues.
  static:
    name: static analysis (rector + pint + phpstan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Catches: PHP upgrade hazards, deprecated APIs, refactors Rector would auto-apply.
      - name: Rector dry-run
        run: vendor/bin/rector process --dry-run
        env:
          LARAVEL_BYPASS_ENV_CHECK: '1'

      # Catches: formatting inconsistencies that violate the project style guide.
      - name: Pint
        run: ./vendor/bin/pint --test

      # Catches: type mismatches, undefined methods/properties, unreachable code.
      - name: PHPStan
        run: vendor/bin/phpstan analyse

  # Guards against frontend regressions and ensures the built assets are valid.
  # Catches: broken Vite builds, failing JS unit tests, routes that break after a production build.
  frontend:
    name: frontend (build + vitest + build-group tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Catches: missing imports, misconfigured Vite plugins, Tailwind/Vue compilation errors.
      - name: Build
        run: npm run build

      # Catches: broken JS logic, component rendering errors, Pinia store bugs.
      - name: Vitest
        run: npx vitest run
        env:
          LARAVEL_BYPASS_ENV_CHECK: '1'

      # Catches: PHP-side assertions that require a real built manifest (e.g. HomeRouteTest).
      - name: Build-group tests
        run: php artisan test --group=build
        env:
          LARAVEL_BYPASS_ENV_CHECK: '1'

  # Guards against regressions in PHP business logic and type safety.
  # Catches: broken routes, validation gaps, action/controller contract violations, missing types.
  php-tests:
    name: php tests (pest + type coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Catches: broken feature flows, unit contract violations, architectural rule breaches.
      - name: Pest
        run: php artisan test
        env:
          LARAVEL_BYPASS_ENV_CHECK: '1'

      # Catches: missing return types, untyped parameters, PHPDoc/native type gaps.
      - name: Type coverage
        run: ./vendor/bin/pest --type-coverage --min=100
        env:
          LARAVEL_BYPASS_ENV_CHECK: '1'

  # Guards against real database/cache integration regressions (PR-only; needs live services).
  # Catches: query failures, migration issues, Redis connectivity problems, ORM edge cases.
  service-tests:
    name: service tests (mysql + redis)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, redis, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Catches: MySQL-specific query issues, migration failures, Eloquent model edge cases.
      - name: Run mysql group
        run: php artisan test --group=mysql
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password

      # Catches: Redis connection issues, cache/session/queue driver failures.
      - name: Run redis group
        run: php artisan test --group=redis
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
