<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup F — Scrap of Paper (with burn effect)</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2a1a0a;
  --ink-soft: #4a3420;
  --paper: #f0e0b2;
  --paper-mid: #d9c58a;
  --paper-edge: #a0855a;
  --paper-shadow: #8a6d3c;
  --desk: #2a1a0e;
  --desk-dark: #1a0d05;
  --desk-light: #3e281a;
  --desk-grain: rgba(80,45,15,0.38);
  --gold: #c8963a;
  --gold-bright: #ebb947;
  --gold-deep: #8a651f;
  --wax-red: #8a1d26;
  --bg-top: #0b0503;
  --bg-bottom: var(--desk);
  --header-bg: linear-gradient(to bottom, #0a0402, #1a0d04);
  --ember: #ff7028;
  --ember-bright: #ffc048;
}
[data-theme="light"] {
  --ink: #3a2414;
  --ink-soft: #5a4226;
  --paper: #fbf2d6;
  --paper-mid: #e9d5a4;
  --paper-edge: #b89c6a;
  --paper-shadow: #8a6d3c;
  --desk: #a87a48;
  --desk-dark: #846030;
  --desk-light: #c49667;
  --desk-grain: rgba(100,62,22,0.3);
  --gold: #a07520;
  --gold-bright: #c4933a;
  --gold-deep: #6a4e14;
  --bg-top: #c49667;
  --bg-bottom: #a87a48;
  --header-bg: linear-gradient(to bottom, #6a4420, #846030);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: var(--bg-bottom); font-family: 'EB Garamond', serif; color: var(--ink); overflow-x: hidden; }

.desk-bg {
  position: fixed; inset: 60px 0 0 0; z-index: 0;
  background: var(--desk);
  background-image:
    repeating-linear-gradient(93deg, transparent 0 68px, var(--desk-grain) 68px 69px, transparent 69px 150px, rgba(0,0,0,0.1) 150px 152px, transparent 152px 270px, var(--desk-grain) 270px 272px),
    repeating-linear-gradient(2deg, transparent 0 200px, rgba(0,0,0,0.06) 200px 202px);
}
.desk-bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(0,0,0,0.55) 100%); }

/* HEADER */
.header {
  position: relative; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 2rem;
  background: var(--header-bg);
  border-bottom: 2px solid rgba(0,0,0,0.6);
  box-shadow: 0 6px 16px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(200,150,58,0.22);
}
.header-nav { display: flex; gap: 1.8rem; }
.header-link { color: var(--gold-bright); font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.12em; text-decoration: none; text-transform: uppercase; }
.header-link:hover { color: #fff4d0; }
.header-actions { display: flex; gap: 0.8rem; }
.header-btn { background: transparent; color: var(--gold-bright); border: 1px solid var(--gold); padding: 0.3rem 0.9rem; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
.header-btn:hover { background: var(--gold); color: #1a0a00; }

/* STAGE */
.stage {
  position: relative; z-index: 5;
  min-height: calc(100vh - 60px);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
}

/* DESK ITEMS */
.desk-item { position: absolute; filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.65)); z-index: 4; }

/* Candle top-left */
.candle-item { top: 40px; left: 60px; filter: drop-shadow(0 0 50px rgba(240,192,96,0.55)) drop-shadow(3px 6px 10px rgba(0,0,0,0.6)); }

/* Ink well + quill top-right */
.quill-item { top: 60px; right: 50px; filter: drop-shadow(3px 6px 10px rgba(0,0,0,0.6)); }

/* Potions bottom-right */
.potions-item { bottom: 40px; right: 50px; display: flex; gap: 8px; align-items: flex-end; filter: drop-shadow(3px 7px 12px rgba(0,0,0,0.65)); }

/* Stack of books bottom-left */
.books-item { bottom: 30px; left: 40px; filter: drop-shadow(3px 6px 10px rgba(0,0,0,0.65)); }

/* Crystal paperweight on the paper scrap */
.crystal-item {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-58%) translateY(-50%);
  z-index: 11;
  filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.5));
}

/* THE SCRAP OF PAPER */
.scrap-wrap { position: relative; width: min(540px, 92vw); z-index: 6; }

.scrap {
  position: relative;
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 50% 40%, var(--paper) 40%, var(--paper-mid) 100%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence baseFrequency='0.65' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.3'/></svg>");
  background-blend-mode: multiply;
  padding: 2.5rem 2.8rem 2rem;
  box-shadow: 0 28px 60px rgba(0,0,0,0.65), 0 12px 22px rgba(0,0,0,0.5), inset 0 0 50px rgba(138,109,60,0.2), 0 0 60px rgba(240,184,96,0.25);
  transform: rotate(-1.2deg);
  /* Torn deckle edges all around */
  clip-path: polygon(
    2% 1%, 6% 0, 12% 2%, 20% 0, 28% 2%, 36% 0, 45% 2%, 54% 0, 63% 2%, 72% 0, 80% 2%, 88% 0, 95% 2%, 100% 4%,
    98% 12%, 100% 22%, 98% 34%, 100% 45%, 98% 58%, 100% 70%, 98% 82%, 100% 92%, 97% 100%,
    90% 98%, 82% 100%, 74% 98%, 66% 100%, 56% 98%, 46% 100%, 36% 98%, 26% 100%, 18% 98%, 10% 100%, 3% 98%, 0 96%,
    2% 88%, 0 78%, 2% 66%, 0 55%, 2% 44%, 0 34%, 2% 22%, 0 12%, 2% 4%
  );
  transition: opacity 0.4s, transform 0.4s;
}
.scrap::before {
  content: ''; position: absolute; inset: 6px;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><g opacity='0.12'><circle cx='20' cy='30' r='1.5' fill='%238a6d3c'/><circle cx='60' cy='70' r='2' fill='%238a6d3c'/><circle cx='80' cy='25' r='1' fill='%238a6d3c'/><circle cx='35' cy='85' r='1.3' fill='%238a6d3c'/></g></svg>");
  pointer-events: none;
}

.scrap-heading {
  text-align: center;
  font-family: 'IM Fell English SC', serif;
  font-size: 0.95rem;
  letter-spacing: 0.2em;
  color: var(--wax-red);
  margin-bottom: 0.3rem;
  text-transform: uppercase;
}
.scrap-sub {
  text-align: center;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1rem;
  margin-bottom: 1.4rem;
}

.scrap-prompt {
  position: relative;
  padding: 0.5rem 0.3rem;
  border-bottom: 1.5px solid rgba(60,40,20,0.4);
}
.scrap-prompt::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: rgba(60,40,20,0.25);
}
.scrap-input {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.25rem;
  color: var(--ink);
  padding: 0.8rem 0.2rem;
}
.scrap-input::placeholder { color: var(--ink-soft); opacity: 0.55; }

.scrap-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 1.3rem;
}
.scrap-hint {
  font-family: 'IM Fell English SC', serif;
  font-size: 0.72rem;
  color: var(--ink-soft);
  opacity: 0.75;
  letter-spacing: 0.1em;
}
.submit-btn {
  background: linear-gradient(to bottom, #ad2a34, var(--wax-red));
  color: var(--paper);
  border: 1.5px solid #5a1016;
  padding: 0.55rem 1.8rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.18em;
  font-size: 0.8rem;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
.submit-btn:hover { transform: translateY(-1px); }

/* BURN ANIMATION */
.burning .scrap {
  animation: curlAndBurn 2.2s cubic-bezier(0.5,0,0.75,0) forwards;
}
@keyframes curlAndBurn {
  0%   { opacity: 1; transform: rotate(-1.2deg) scale(1); filter: brightness(1); }
  20%  { filter: brightness(1.15) sepia(0.3); }
  40%  { transform: rotate(-3deg) scale(0.96) translateY(-10px); filter: brightness(0.9) sepia(0.6) saturate(1.5); }
  70%  { transform: rotate(-7deg) scale(0.85) translateY(-30px); filter: brightness(0.6) sepia(0.9) saturate(1.8); opacity: 0.85; }
  100% { transform: rotate(-14deg) scale(0.5) translateY(-100px); filter: brightness(0.3) sepia(1) saturate(2); opacity: 0; }
}

/* Ember particles emitted during burn */
.embers {
  position: absolute; inset: 0;
  pointer-events: none;
  display: none;
}
.burning .embers { display: block; }
.ember {
  position: absolute;
  width: 5px; height: 5px;
  background: radial-gradient(circle, var(--ember-bright), var(--ember) 50%, transparent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--ember), 0 0 16px var(--ember-bright);
  opacity: 0;
}
.burning .ember { animation: emberRise 2.5s ease-out forwards; }
@keyframes emberRise {
  0%   { opacity: 0; transform: translate(0,0) scale(1); }
  15%  { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--dx, 20px), -260px) scale(0.2); }
}
.e1 { bottom: 30%; left: 20%; --dx: -30px; animation-delay: 0.3s; }
.e2 { bottom: 35%; left: 40%; --dx: 10px; animation-delay: 0.5s; }
.e3 { bottom: 25%; left: 55%; --dx: 25px; animation-delay: 0.7s; }
.e4 { bottom: 40%; left: 70%; --dx: -15px; animation-delay: 0.4s; }
.e5 { bottom: 32%; left: 30%; --dx: 35px; animation-delay: 0.9s; }
.e6 { bottom: 28%; left: 60%; --dx: -25px; animation-delay: 1.1s; }
.e7 { bottom: 38%; left: 50%; --dx: 15px; animation-delay: 1.4s; }
.e8 { bottom: 22%; left: 45%; --dx: -40px; animation-delay: 1.6s; }

/* Orange glow under paper while burning */
.burn-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(255,112,40,0.5), transparent 60%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.burning .burn-glow { opacity: 1; animation: burnGlowFade 2.2s ease-out forwards; }
@keyframes burnGlowFade {
  0%   { opacity: 0; }
  25%  { opacity: 0.7; }
  100% { opacity: 0; }
}

/* Reset button shown after burn */
.reset-btn {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold-bright);
  padding: 0.6rem 1.6rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.12em;
  font-size: 0.85rem;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease 2.2s;
}
.burning .reset-btn { opacity: 1; pointer-events: auto; }
.reset-btn:hover { background: var(--gold); color: #1a0a00; }

/* Chicken-scratch note on desk */
.desk-scratch {
  position: absolute;
  color: rgba(220,180,110,0.25);
  pointer-events: none;
  z-index: 2;
}

@media (max-width: 720px) {
  .candle-item, .quill-item, .potions-item, .books-item { display: none; }
  .scrap { padding: 1.8rem 1.6rem; }
  .header-nav { gap: 0.6rem; } .header-link { font-size: 0.7rem; }
}
</style>
</head>

</header>

<div class="stage">

  <!-- CANDLE -->

          <line x1="45" y1="75" x2="48" y2="82"/><line x1="65" y1="80" x2="68" y2="87"/><line x1="85" y1="81" x2="88" y2="88"/><line x1="105" y1="81" x2="108" y2="88"/><line x1="125" y1="79" x2="128" y2="86"/><line x1="145" y1="77" x2="148" y2="84"/>
        </g>
      </g>

        <linearGradient id="book1G" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#6a1a24"/><stop offset="1" stop-color="#3a0a12"/></linearGradient>
        <linearGradient id="book2G" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1a3a5a"/><stop offset="1" stop-color="#0a1e3a"/></linearGradient>

  <!-- POTIONS (smaller cluster) -->

  <!-- Desk scratches doodle -->
  <svg class="desk-scratch" style="top: 48%; left: 8%; width: 120px; height: 30px; transform: rotate(-4deg);" viewBox="0 0 120 30">
    <path d="M5 12 q4 -6 8 -1 t6 0 q4 -4 8 0 t5 -1 q4 3 7 -2 t6 1 q4 -3 7 0 t5 -1 q4 3 7 -1" stroke="currentColor" stroke-width="0.9" fill="none"/>
  </svg>

  <!-- THE SCRAP -->
  <div class="scrap-wrap" id="scrapWrap">
    <div class="burn-glow"></div>
    <div class="embers">
      <span class="ember e1"></span><span class="ember e2"></span><span class="ember e3"></span>
      <span class="ember e4"></span><span class="ember e5"></span><span class="ember e6"></span>
      <span class="ember e7"></span><span class="ember e8"></span>
    </div>

    <!-- Crystal paperweight -->
    <svg class="crystal-item" width="58" height="58" viewBox="0 0 58 58">
      <defs>
        <linearGradient id="crystalG" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#e0f0ff"/>
          <stop offset="0.5" stop-color="#8ab8e4"/>
          <stop offset="1" stop-color="#3a5a8a"/>
        </linearGradient>
      </defs>
      <!-- base shadow -->
      <ellipse cx="29" cy="50" rx="18" ry="4" fill="#000" opacity="0.4"/>
      <!-- crystal faceted body -->
      <path d="M29 8 L14 24 L18 46 L29 52 L40 46 L44 24 Z" fill="url(#crystalG)" stroke="#1a2e4a" stroke-width="0.7"/>
      <!-- facet lines -->
      <path d="M29 8 L29 52 M14 24 L44 24 M18 46 L29 24 L40 46" stroke="#1a2e4a" stroke-width="0.4" fill="none" opacity="0.5"/>
      <!-- highlight -->
      <path d="M20 18 L24 40" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <!-- glow -->
      <circle cx="29" cy="28" r="5" fill="#cfe5f5" opacity="0.7"/>
    </svg>

    <article class="scrap" id="scrap">
      <div class="scrap-heading">❦ A Note to the Archive ❦</div>
      <div class="scrap-sub">inscribe thy question here</div>

      <div class="scrap-prompt">
        <input
          type="text"
          class="scrap-input"
          id="scrapInput"
          placeholder="I need to escape a collapsing mine shaft..."
          autocomplete="off"
        >
      </div>

      <div class="scrap-actions">
        <span class="scrap-hint">press '/' to take up the quill</span>
        <button class="submit-btn" id="sendBtn">Send</button>
      </div>
    </article>

    <button class="reset-btn" id="resetBtn">Draw Another Scrap</button>
  </div>

</div>

<script>
  const toggle = document.getElementById('themeToggle');
  const input = document.getElementById('scrapInput');
  const sendBtn = document.getElementById('sendBtn');
  const resetBtn = document.getElementById('resetBtn');
  const scrapWrap = document.getElementById('scrapWrap');

  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.body.dataset.theme = 'light';
    toggle.textContent = '☀ Day';
  }

  toggle.addEventListener('click', () => {
    const current = document.body.dataset.theme;
    document.body.dataset.theme = current === 'dark' ? 'light' : 'dark';
    toggle.textContent = current === 'dark' ? '☀ Day' : '☾ Night';
  });

  sendBtn.addEventListener('click', () => {
    if (!input.value.trim()) input.value = 'I need to escape a collapsing mine shaft...';
    scrapWrap.classList.add('burning');
  });

  resetBtn.addEventListener('click', () => {
    scrapWrap.classList.remove('burning');
    input.value = '';
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== input && !scrapWrap.classList.contains('burning')) {
      e.preventDefault();
      input.focus();
    }
    if (e.key === 'Enter' && document.activeElement === input) {
      sendBtn.click();
    }
  });
</script>

</body>
</html>
