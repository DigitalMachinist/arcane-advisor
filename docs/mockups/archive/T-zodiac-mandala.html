<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup T — Zodiac Mandala</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --desk: #241811; --ink: #f3e7cf; --ink-dim: #b8a681;
    --scrap: #e9d5a6; --brass: #c4a156; --brass-dark: #806330;
    --gold: #c79a47; --arcane: #ffd57a; --arcane-deep: #e89a2a;
    --arcane-glow: rgba(255, 200, 90, 0.75);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 50%, #3a2818 0%, #120905 82%), var(--desk);
    font-family: 'EB Garamond', serif; color: var(--ink); overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(91deg, transparent 0 90px, rgba(0,0,0,0.1) 90px 91px);
    pointer-events: none; z-index: 1;
  }
  .brand {
    position: absolute; top: 26px; left: 40px;
    font-family: 'Cinzel Decorative', serif;
    font-size: 16px; color: var(--gold);
    letter-spacing: 0.22em; text-transform: uppercase; z-index: 20;
  }
  .stage {
    position: relative; width: 100%; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .circle-wrap { position: relative; width: 900px; height: 900px; }
  .ritual-halo {
    position: absolute; inset: -80px;
    background: radial-gradient(circle at center, rgba(255,200,90,0.26) 0%, rgba(255,180,60,0.09) 42%, transparent 72%);
    animation: halo 5s ease-in-out infinite; pointer-events: none;
  }
  @keyframes halo { 0%,100%{opacity:.9;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
  .circle-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    filter: drop-shadow(0 0 24px var(--arcane-glow)) drop-shadow(0 0 48px rgba(255,180,80,0.3));
  }
  .ring-outer { animation: spin 200s linear infinite; transform-origin: 450px 450px; }
  .ring-mid { animation: spin 140s linear infinite reverse; transform-origin: 450px 450px; }
  .ring-inner { animation: spin 100s linear infinite; transform-origin: 450px 450px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .needle-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9; }
  .needle { transform-origin: 450px 450px; transition: transform 0.8s cubic-bezier(.3,1.4,.5,1); }

  .scrap {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-1.5deg);
    width: 320px; min-height: 180px;
    background: var(--scrap);
    background-image: repeating-linear-gradient(0deg, transparent 0 27px, rgba(74,52,32,0.18) 27px 28px);
    padding: 22px 24px;
    clip-path: polygon(2% 4%,10% 1%,22% 3%,34% 0%,46% 2%,60% 1%,74% 3%,88% 0%,99% 6%,97% 20%,100% 36%,98% 52%,100% 68%,97% 82%,99% 94%,88% 98%,74% 96%,58% 99%,42% 97%,26% 100%,10% 97%,1% 92%,3% 76%,0% 60%,2% 44%,0% 28%,3% 14%);
    box-shadow: 0 12px 36px rgba(0,0,0,0.6); z-index: 11;
  }
  .scrap textarea {
    width: 100%; min-height: 118px;
    background: transparent; border: none; outline: none; resize: none;
    font-family: 'EB Garamond', serif; font-style: italic;
    font-size: 18px; line-height: 27px; color: #3a2614;
  }
  .scrap textarea::placeholder { color: rgba(58,38,20,0.45); }
  .scrap .submit-row { display: flex; justify-content: flex-end; margin-top: 10px; }
  .scrap button {
    font-family: 'Cinzel Decorative', serif;
    background: transparent; border: 1px solid rgba(74,52,32,0.5);
    color: #3a2614; padding: 6px 16px; font-size: 10px;
    letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase;
  }
  .scrap button:hover { background: rgba(255,200,90,0.3); border-color: var(--arcane-deep); color: var(--arcane-deep); }

  .symbols { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .symbol {
    position: absolute; width: 64px; height: 64px;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: auto; transition: all 0.4s ease;
  }
  .symbol svg {
    width: 42px; height: 42px;
    stroke: var(--ink-dim); stroke-width: 1.8; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
    transition: all 0.4s ease;
  }
  .symbol:hover svg { stroke: var(--arcane); filter: drop-shadow(0 0 6px var(--arcane-glow)); }
  .symbol.active svg {
    stroke: var(--arcane); stroke-width: 2.2;
    filter: drop-shadow(0 0 10px var(--arcane)) drop-shadow(0 0 20px var(--arcane-glow));
  }
  .symbol .label {
    position: absolute; top: 66px; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px; letter-spacing: 0.28em;
    color: var(--ink-dim); text-transform: uppercase; white-space: nowrap;
    transition: color 0.4s ease;
  }
  .symbol.active .label { color: var(--arcane); text-shadow: 0 0 8px var(--arcane-glow); }
</style>
</head>
<body>

<div class="brand">Arcane Advisor</div>

<div class="stage">
  <div class="circle-wrap">
    <div class="ritual-halo"></div>

    <!-- Casting circle T: Zodiac / 12-sector mandala.
         Outer ring: degree ticks.
         Mid ring: 12 sectors (zodiacal) with small glyphs between dividers.
         Inner mandala: 12-point star from radiating lines + nested circles. -->
    <svg class="circle-svg" viewBox="0 0 900 900">
      <defs>
        <radialGradient id="glow-t" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="rgba(255,220,140,0.22)"/>
          <stop offset="70%" stop-color="rgba(255,180,80,0.06)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <circle cx="450" cy="450" r="420" fill="url(#glow-t)"/>

      <!-- OUTER ring: ticks + 4 cardinal runes -->
      <g class="ring-outer">
        <circle cx="450" cy="450" r="420" fill="none" stroke="var(--arcane)" stroke-width="1.4" opacity="0.75"/>
        <circle cx="450" cy="450" r="405" fill="none" stroke="var(--arcane-deep)" stroke-width="0.6" opacity="0.5"/>
        <g stroke="var(--arcane)" stroke-width="1.1" opacity="0.7" id="major-ticks"></g>
        <g stroke="var(--arcane)" stroke-width="0.5" opacity="0.4" id="minor-ticks"></g>
      </g>

      <!-- MIDDLE ring: 12 zodiac sectors (dividers + inscribed glyph marks) -->
      <g class="ring-mid">
        <circle cx="450" cy="450" r="370" fill="none" stroke="var(--arcane)" stroke-width="1" opacity="0.65"/>
        <circle cx="450" cy="450" r="320" fill="none" stroke="var(--arcane)" stroke-width="1" opacity="0.65"/>
        <!-- 12 sector dividers -->
        <g stroke="var(--arcane)" stroke-width="0.8" opacity="0.55" id="sector-dividers"></g>
        <!-- Rune marks in each sector (placed at radius 345, centered in sector) -->
        <g font-family="serif" font-size="18" fill="var(--arcane)" text-anchor="middle" opacity="0.75" id="sector-glyphs"></g>
      </g>

      <!-- INNER ring: 12-point radial mandala -->
      <g class="ring-inner">
        <circle cx="450" cy="450" r="260" fill="none" stroke="var(--arcane)" stroke-width="0.9" opacity="0.6"/>
        <circle cx="450" cy="450" r="245" fill="none" stroke="var(--arcane-deep)" stroke-width="0.5" opacity="0.4" stroke-dasharray="2 4"/>
        <!-- 12 radiating spokes from r=160 to r=245 -->
        <g stroke="var(--arcane)" stroke-width="0.7" opacity="0.55" id="mandala-spokes"></g>
        <!-- 12-point star (triangles alternating) -->
        <g stroke="var(--arcane)" stroke-width="0.6" fill="none" opacity="0.5" id="star-12"></g>
      </g>

      <!-- Static crosshair -->
      <g stroke="var(--arcane)" stroke-width="1" fill="none" opacity="0.4">
        <line x1="450" y1="140" x2="450" y2="760"/>
        <line x1="140" y1="450" x2="760" y2="450"/>
      </g>
      <g font-family="'Cinzel Decorative', serif" font-size="16" fill="var(--arcane)" text-anchor="middle" opacity="0.9" letter-spacing="2">
        <text x="450" y="92">N</text>
        <text x="800" y="454">E</text>
        <text x="100" y="454">W</text>
      </g>

      <!-- Central dot + concentric decorative rings at core -->
      <circle cx="450" cy="450" r="70" fill="none" stroke="var(--arcane)" stroke-width="0.5" opacity="0.4"/>
      <circle cx="450" cy="450" r="50" fill="none" stroke="var(--arcane)" stroke-width="0.5" opacity="0.45"/>
      <circle cx="450" cy="450" r="30" fill="none" stroke="var(--arcane)" stroke-width="0.6" opacity="0.55"/>
      <circle cx="450" cy="450" r="18" fill="none" stroke="var(--arcane)" stroke-width="0.8" opacity="0.7"/>
      <circle cx="450" cy="450" r="10" fill="var(--arcane-deep)" opacity="0.6"/>
    </svg>

    <!-- NEEDLE (P style: black/gold diamond) -->
    <svg class="needle-svg" viewBox="0 0 900 900">
      <g class="needle" id="needle">
        <polygon points="450,450 418,320 450,180 482,320" fill="#1b0f07" stroke="var(--arcane-deep)" stroke-width="0.8"/>
        <polygon points="450,450 434,380 450,180 466,380" fill="#3a2414" opacity="0.75"/>
        <polygon points="450,450 414,580 450,760 486,580" fill="var(--arcane)" stroke="var(--arcane-deep)" stroke-width="0.8"
                 style="filter: drop-shadow(0 0 8px var(--arcane)) drop-shadow(0 0 18px var(--arcane-glow));"/>
        <polygon points="450,450 434,520 450,760 466,520" fill="#fff3d0" opacity="0.6"/>
        <circle cx="450" cy="450" r="18" fill="var(--brass)" stroke="var(--arcane-deep)" stroke-width="1.2"/>
        <circle cx="450" cy="450" r="11" fill="var(--brass-dark)"/>
        <circle cx="450" cy="450" r="4" fill="#120906"/>
      </g>
    </svg>

    <!-- Symbols (S style: runic) — spread wide -->
    <div class="symbols">
      <div class="symbol" data-angle="230" style="left: 75px; top: 765px;">
        <svg viewBox="0 0 40 40"><line x1="20" y1="6" x2="20" y2="34"/><line x1="20" y1="8" x2="10" y2="16"/><line x1="20" y1="8" x2="30" y2="16"/></svg>
        <span class="label">Tactical</span>
      </div>
      <div class="symbol" data-angle="200" style="left: 282px; top: 871px;">
        <svg viewBox="0 0 40 40"><line x1="8" y1="8" x2="32" y2="32"/><line x1="32" y1="8" x2="8" y2="32"/><circle cx="20" cy="20" r="3"/></svg>
        <span class="label">Balanced</span>
      </div>
      <div class="symbol active" data-angle="180" style="left: 450px; top: 940px;">
        <svg viewBox="0 0 40 40"><line x1="8" y1="8" x2="8" y2="32"/><line x1="32" y1="8" x2="32" y2="32"/><line x1="8" y1="8" x2="32" y2="32"/><line x1="32" y1="8" x2="8" y2="32"/></svg>
        <span class="label">Creative</span>
      </div>
      <div class="symbol" data-angle="160" style="left: 618px; top: 871px;">
        <svg viewBox="0 0 40 40"><path d="M20 6 L20 34"/><path d="M20 12 Q12 16 10 22"/><path d="M20 22 Q28 26 30 32"/><circle cx="20" cy="6" r="2"/><circle cx="20" cy="34" r="2"/></svg>
        <span class="label">Theatrical</span>
      </div>
      <div class="symbol" data-angle="130" style="left: 825px; top: 765px;">
        <svg viewBox="0 0 40 40"><path d="M10 6 L10 34"/><path d="M10 8 L24 14 L10 20"/><path d="M24 14 L30 24 L20 30 L30 34"/></svg>
        <span class="label">Chaotic</span>
      </div>
    </div>

    <div class="scrap">
      <textarea placeholder="Inscribe thy question..."></textarea>
      <div class="submit-row"><button>Consult</button></div>
    </div>
  </div>
</div>

<script>
  const svgNS = "http://www.w3.org/2000/svg";
  const cx = 450, cy = 450;
  // Outer degree ticks
  const major = document.getElementById('major-ticks'), minor = document.getElementById('minor-ticks');
  for (let deg = 0; deg < 360; deg += 5) {
    const isMajor = deg % 15 === 0;
    const len = isMajor ? 16 : 7;
    const r1 = 420, r2 = 420 - len;
    const rad = (deg - 90) * Math.PI / 180;
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', cx + r1*Math.cos(rad));
    line.setAttribute('y1', cy + r1*Math.sin(rad));
    line.setAttribute('x2', cx + r2*Math.cos(rad));
    line.setAttribute('y2', cy + r2*Math.sin(rad));
    (isMajor ? major : minor).appendChild(line);
  }
  // 12 sector dividers (every 30°)
  const dividers = document.getElementById('sector-dividers');
  const glyphs = document.getElementById('sector-glyphs');
  const runeMarks = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ'];
  for (let i = 0; i < 12; i++) {
    const deg = i * 30;
    const rad = (deg - 90) * Math.PI / 180;
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', cx + 320*Math.cos(rad));
    line.setAttribute('y1', cy + 320*Math.sin(rad));
    line.setAttribute('x2', cx + 370*Math.cos(rad));
    line.setAttribute('y2', cy + 370*Math.sin(rad));
    dividers.appendChild(line);
    // Glyph at center of each sector
    const gDeg = deg + 15;
    const gRad = (gDeg - 90) * Math.PI / 180;
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', cx + 345*Math.cos(gRad));
    t.setAttribute('y', cy + 345*Math.sin(gRad) + 6);
    t.textContent = runeMarks[i];
    glyphs.appendChild(t);
  }
  // Mandala spokes (12)
  const spokes = document.getElementById('mandala-spokes');
  for (let i = 0; i < 12; i++) {
    const deg = i * 30;
    const rad = (deg - 90) * Math.PI / 180;
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', cx + 160*Math.cos(rad));
    line.setAttribute('y1', cy + 160*Math.sin(rad));
    line.setAttribute('x2', cx + 245*Math.cos(rad));
    line.setAttribute('y2', cy + 245*Math.sin(rad));
    spokes.appendChild(line);
  }
  // 12-point star: two overlapping hexagrams
  const star = document.getElementById('star-12');
  function poly(r, offset, n) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      const deg = offset + (360/n)*i;
      const rad = (deg - 90) * Math.PI / 180;
      pts.push(`${cx + r*Math.cos(rad)},${cy + r*Math.sin(rad)}`);
    }
    return pts.join(' ');
  }
  // triangle 1 and 2 (hexagram 1)
  const t1 = document.createElementNS(svgNS, 'polygon');
  t1.setAttribute('points', poly(230, 0, 3));
  star.appendChild(t1);
  const t2 = document.createElementNS(svgNS, 'polygon');
  t2.setAttribute('points', poly(230, 180, 3));
  star.appendChild(t2);
  // hexagram 2 rotated 30°
  const t3 = document.createElementNS(svgNS, 'polygon');
  t3.setAttribute('points', poly(230, 30, 3));
  t3.setAttribute('opacity', '0.6');
  star.appendChild(t3);
  const t4 = document.createElementNS(svgNS, 'polygon');
  t4.setAttribute('points', poly(230, 210, 3));
  t4.setAttribute('opacity', '0.6');
  star.appendChild(t4);

  const needle = document.getElementById('needle');
  const symbols = document.querySelectorAll('.symbol');
  symbols.forEach(sym => sym.addEventListener('click', () => {
    symbols.forEach(s => s.classList.remove('active'));
    sym.classList.add('active');
    needle.style.transform = `rotate(${parseFloat(sym.dataset.angle) - 180}deg)`;
  }));
</script>
</body>
</html>
